name: Check Claude Desktop Update

on:
  schedule:
    - cron: '17 8 * * *'  # UTC 8:17 daily (Beijing 16:17)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check latest version
        id: check
        run: node scripts/check-version.js

      - name: Exit if no update
        if: steps.check.outputs.HAS_UPDATE != 'true'
        run: echo "No update found. Current is latest." && exit 0

      - name: Download installer
        if: steps.check.outputs.HAS_UPDATE == 'true'
        run: |
          VERSION="${{ steps.check.outputs.LATEST_VERSION }}"
          URL="${{ steps.check.outputs.DOWNLOAD_URL }}"
          curl -L -o "Claude-Desktop-v${VERSION}-x64.exe" "$URL"
          ls -lh Claude-Desktop-*.exe

      - name: Package schemes
        if: steps.check.outputs.HAS_UPDATE == 'true'
        run: |
          zip -r 3p-https-without-login-without-patch.zip 3p-https-without-login-without-patch/
          zip -r 3p-http-without-login-need-patch.zip 3p-http-without-login-need-patch/
          zip -r official-need-login-need-patch.zip official-need-login-need-patch/

      - name: Create Release
        if: steps.check.outputs.HAS_UPDATE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.LATEST_VERSION }}
          name: Claude Desktop v${{ steps.check.outputs.LATEST_VERSION }}
          body: |
            ## Claude Desktop v${{ steps.check.outputs.LATEST_VERSION }}

            ### 下载

            | 文件 | 说明 |
            |------|------|
            | `Claude-Desktop-v${{ steps.check.outputs.LATEST_VERSION }}-x64.exe` | 官方安装包 |
            | `3p-https-without-login-without-patch.zip` | ⭐ 方案1：3P Gateway（推荐，HTTPS，免登录，不改文件） |
            | `3p-http-without-login-need-patch.zip` | 方案2：3P Gateway + HTTP 补丁（免登录） |
            | `official-need-login-need-patch.zip` | 方案3：官方版补丁（需登录，功能解锁） |

            ### 方案说明

            **⭐ 方案1 - 3P HTTPS（推荐，免登录）**
            仅写注册表，不修改任何 Claude 文件。需要 HTTPS 端点。
            自动读取 `~/.claude/settings.json` 配置。

            **方案2 - 3P HTTP（免登录）**
            在方案1基础上，去除 HTTPS 限制，支持 HTTP 端点（如 localhost）。
            复制 Claude 到本地 portable 目录运行。

            **方案3 - 官方版补丁（需登录）**
            需要 Anthropic 账号登录。解锁隐藏功能（Code Tab、Operon、Computer Use 等）。

            ---
            SHA256: `${{ steps.check.outputs.SHA256 }}`
          files: |
            Claude-Desktop-v${{ steps.check.outputs.LATEST_VERSION }}-x64.exe
            3p-https-without-login-without-patch.zip
            3p-http-without-login-need-patch.zip
            official-need-login-need-patch.zip

      - name: Update version file
        if: steps.check.outputs.HAS_UPDATE == 'true'
        run: |
          echo "${{ steps.check.outputs.LATEST_VERSION }}" > scripts/version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/version.txt
          git commit -m "chore: update version to ${{ steps.check.outputs.LATEST_VERSION }}"
          git push
